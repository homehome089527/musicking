<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>金曲猜歌王</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            --bg: #0a0a0b;
            --card-bg: #141416;
            --panel-bg: #1c1c1f;
            --input-bg: #0f0f11;
            --accent: #e8001c;
            --accent-glow: rgba(232,0,28,0.25);
            --text: #f0f0f2;
            --text-sub: #666;
            --text-mid: #999;
            --border: #242428;
            --border-bright: #38383d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(232,0,28,0.08) 0%, transparent 70%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: 0 0 80px rgba(232,0,28,0.1), 0 40px 80px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 520px;
        }

        @media (min-width: 900px) {
            .container { max-width: 1020px; padding: 44px; }
            .game-layout { display: flex; flex-direction: row; align-items: flex-start; gap: 44px; }
            .left-panel { flex: 1; }
            .right-panel { flex: 1.3; display: flex; flex-direction: column; }
        }

        .app-title {
            font-size: 1.6rem; font-weight: 900; color: var(--accent);
            text-align: center; letter-spacing: 2px; margin-bottom: 28px;
            text-shadow: 0 0 30px var(--accent-glow);
        }

        #loading { text-align: center; padding: 40px 20px; color: var(--text-mid); }
        .loading-dot {
            display: inline-block; width: 8px; height: 8px;
            background: var(--accent); border-radius: 50%; margin: 0 3px;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
        .error-msg { color: #ff4455; font-size: 0.95rem; margin-top: 12px; line-height: 1.6; }

        .setup-desc { color: var(--text-mid); font-size: 1rem; margin-bottom: 20px; text-align: center; }
        .setup-box { display: flex; flex-direction: column; gap: 16px; margin: 20px 0; align-items: center; }
        .input-group { display: flex; align-items: center; gap: 14px; font-size: 1.1rem; color: var(--text-mid); }
        input[type="number"] {
            background: var(--input-bg); border: 1px solid var(--border-bright);
            color: var(--text); padding: 14px; border-radius: 10px;
            width: 100px; text-align: center; font-size: 1.3rem; font-weight: 700;
            font-family: inherit; outline: none; transition: border-color 0.2s;
        }
        input[type="number"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .db-info { color: var(--text-sub); font-size: 0.88rem; text-align: center; line-height: 1.8; }
        .db-info span { color: var(--text-mid); font-weight: 700; }

        #qrcodeLink {
            text-decoration: none; display: block;
            width: fit-content; margin: 0 auto; transition: transform 0.2s;
        }
        #qrcodeLink:hover { transform: scale(1.02); }
        #qrcode {
            background: white; padding: 14px; border-radius: 18px;
            width: 260px; height: 260px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6); margin: 0 auto;
        }
        #qrcode img { max-width: 100%; height: auto !important; }
        .click-hint { color: var(--text-sub); font-size: 0.82rem; margin-top: 12px; text-align: center; letter-spacing: 0.5px; }

        /* ── YouTube 播放器 ── */
        .player-wrap {
            position: relative; width: 100%; padding-top: 56.25%;
            border-radius: 18px; overflow: hidden; background: #000;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }
        .player-wrap iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }
        .player-placeholder {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px; color: var(--text-sub); font-size: 0.9rem;
        }
        .player-placeholder .play-icon { font-size: 3rem; opacity: 0.3; }

        .info-box {
            min-height: 150px; background: var(--panel-bg);
            border-radius: 18px; padding: 28px 24px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            border: 1px solid var(--border);
            position: relative; overflow: hidden; margin-bottom: 14px;
        }
        .info-box::before {
            content: ''; position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0; transition: opacity 0.4s;
        }
        .info-box.revealed::before { opacity: 1; }
        .hidden-info {
            filter: blur(18px); opacity: 0.35;
            transition: filter 0.5s ease, opacity 0.5s ease;
            user-select: none;
            display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%;
        }
        .revealed .hidden-info { filter: blur(0); opacity: 1; }
        .song-title { font-size: 1.9rem; font-weight: 900; color: var(--text); line-height: 1.2; text-align: center; }
        .artist { font-size: 1.3rem; color: var(--accent); font-weight: 700; text-align: center; }
        .year {
            font-size: 0.9rem; color: var(--text-mid);
            background: #2a2a2e; padding: 4px 14px; border-radius: 20px;
            margin-top: 4px; border: 1px solid var(--border-bright);
        }

        .control-panel {
            background: #111114; padding: 14px;
            border-radius: 14px; border: 1px solid var(--border); margin-bottom: 14px;
        }
        .search-group { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        #searchSong {
            flex: 1; padding: 11px 14px;
            background: var(--input-bg); border: 1px solid var(--border-bright);
            color: var(--text); border-radius: 8px; font-size: 0.95rem;
            font-family: inherit; outline: none; transition: border-color 0.2s;
        }
        #searchSong:focus { border-color: var(--accent); }
        #songSelect {
            width: 100%; padding: 11px 14px;
            background: var(--input-bg); color: var(--text);
            border: 1px solid var(--border-bright); border-radius: 8px;
            font-size: 0.95rem; font-family: inherit; outline: none; cursor: pointer;
        }

        .btn-group { display: flex; gap: 12px; margin-top: 14px; }
        .btn-primary {
            flex: 1; padding: 16px; border: none; border-radius: 14px;
            font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit;
            transition: transform 0.1s, filter 0.15s, box-shadow 0.15s;
        }
        .btn-primary:active { transform: scale(0.96); }
        .btn-primary:hover:not(:disabled) { filter: brightness(1.12); }
        .btn-next { background: var(--text); color: #000; }
        .btn-prev { background: var(--panel-bg); color: var(--text-mid); border: 1px solid var(--border-bright); }
        .btn-prev:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-reveal { background: var(--accent); color: #fff; box-shadow: 0 4px 20px var(--accent-glow); }
        .btn-start {
            display: block; width: 100%; padding: 18px; margin-top: 20px;
            background: var(--accent); color: #fff; border: none; border-radius: 14px;
            font-size: 1.1rem; font-weight: 900; cursor: pointer; font-family: inherit;
            box-shadow: 0 4px 24px var(--accent-glow);
            transition: filter 0.15s, transform 0.1s; letter-spacing: 1px;
        }
        .btn-start:hover { filter: brightness(1.1); }
        .btn-start:active { transform: scale(0.98); }

        .status-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 14px; padding: 10px 14px;
            background: #111114; border-radius: 10px; border: 1px solid var(--border);
            font-size: 0.88rem; color: var(--text-sub);
        }
        .reset-link { color: var(--text-sub); text-decoration: none; font-size: 0.85rem; transition: color 0.15s; }
        .reset-link:hover { color: var(--text-mid); }

        #endScreen { display: none; text-align: center; padding: 20px 0; }
        .end-trophy { font-size: 4rem; margin-bottom: 16px; display: block; }
        .end-title { font-size: 1.8rem; font-weight: 900; color: var(--text); margin-bottom: 8px; }
        .end-subtitle { color: var(--text-sub); font-size: 1rem; margin-bottom: 32px; }
        .end-actions { display: flex; gap: 12px; }
        .btn-end-action {
            flex: 1; padding: 16px; border-radius: 14px;
            font-size: 0.95rem; font-weight: 700; cursor: pointer;
            font-family: inherit; border: 1px solid var(--border-bright); transition: all 0.15s;
        }
        .btn-end-action:active { transform: scale(0.97); }
        .btn-replay { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 20px var(--accent-glow); }
        .btn-replay:hover { filter: brightness(1.1); }
        .btn-reset-end { background: transparent; color: var(--text-mid); }
        .btn-reset-end:hover { background: var(--panel-bg); color: var(--text); }

        @media (max-width: 480px) {
            .container { padding: 20px; border-radius: 20px; }
            .song-title { font-size: 1.5rem; }
            .btn-group { flex-direction: column; }
        }

        .desktop-btns { display: none; }
        .mobile-btns { display: flex; }
        @media (min-width: 900px) {
            .desktop-btns { display: flex; }
            .mobile-btns { display: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="app-title">🎵 華語金曲猜歌王 🎵</h1>

    <div id="loading">
        正在讀取雲端題庫
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
    </div>

    <div id="setupArea" style="display:none;">
        <p class="setup-desc">請選擇出題年份範圍</p>
        <div class="setup-box">
            <div class="input-group">
                <input type="number" id="startYearInput" placeholder="開始">
                <span>至</span>
                <input type="number" id="endYearInput" placeholder="結束">
            </div>
            <div class="db-info">
                資料庫共 <span id="totalCount">0</span> 首 ·
                年份 <span id="dbMinYear"></span>–<span id="dbMaxYear"></span>
            </div>
        </div>
        <button class="btn-start" onclick="startGame()">🚀 開始遊戲</button>
    </div>

    <div id="gameArea" style="display:none;">
        <div class="game-layout">
            <div class="left-panel">
                <div class="player-wrap" id="playerWrap">
                    <div class="player-placeholder" id="playerPlaceholder">
                        <span class="play-icon">▶️</span>
                        <span>等待出題...</span>
                    </div>
                </div>
                <div class="btn-group desktop-btns" style="margin-top:20px;">
                    <button class="btn-primary btn-prev" onclick="prevSong()">⬅️ 上一首</button>
                    <button class="btn-primary btn-next" onclick="nextSongRandom()">🎲 下一題</button>
                    <button class="btn-primary btn-reveal" onclick="reveal()">👀 看答案</button>
                </div>
            </div>

            <div class="right-panel">
                <div class="info-box" id="infoBox">
                    <div class="hidden-info">
                        <div class="song-title" id="title">歌名</div>
                        <div class="artist" id="artist">歌手</div>
                        <div class="year" id="year">????</div>
                    </div>
                </div>

                <div class="control-panel">
                    <div class="search-group">
                        <span style="font-size:1.3rem;">🔍</span>
                        <input type="text" id="searchSong" placeholder="搜尋歌名、歌手或年份..." oninput="filterSongList()">
                    </div>
                    <select id="songSelect" onchange="playSelectedSong()">
                        <option value="">快速選歌...</option>
                    </select>
                </div>

                <div class="btn-group mobile-btns">
                    <button class="btn-primary btn-prev" onclick="prevSong()">⬅️ 上一首</button>
                    <button class="btn-primary btn-next" onclick="nextSongRandom()">🎲 下一題</button>
                    <button class="btn-primary btn-reveal" onclick="reveal()">👀 看答案</button>
                </div>

                <div class="status-bar">
                    <span>剩餘題目：<strong id="remaining" style="color:var(--text-mid)">0</strong> 首</span>
                    <a href="#" onclick="resetToSetup(); return false;" class="reset-link">⚙️ 重設</a>
                </div>
            </div>
        </div>
    </div>

    <div id="endScreen">
        <span class="end-trophy">🎉</span>
        <div class="end-title">所有歌曲播完了！</div>
        <div class="end-subtitle">感謝大家參與金曲猜歌王</div>
        <div class="end-actions">
            <button class="btn-end-action btn-replay" onclick="replayGame()">🔁 再玩一次</button>
            <button class="btn-end-action btn-reset-end" onclick="resetToSetup()">⚙️ 重設條件</button>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz8DV2RS3V9-q7XRDnFfnVb-ZZVS8pG8A__TXnJwd-vAh4M3pv1vPv4bZNj6nt2wDiY/exec";

    let fullDatabase = [], gameQueue = [], originalQueue = [], history = [];
    let currentSong = null;

    const loadingDiv     = document.getElementById("loading");
    const setupArea      = document.getElementById("setupArea");
    const gameArea       = document.getElementById("gameArea");
    const endScreen      = document.getElementById("endScreen");
    const startYearInput = document.getElementById("startYearInput");
    const endYearInput   = document.getElementById("endYearInput");
    const infoBox        = document.getElementById("infoBox");
    const hiddenInfoDiv  = document.querySelector('.hidden-info');
    const remainingText  = document.getElementById("remaining");
    const songSelect     = document.getElementById("songSelect");
    const searchInput    = document.getElementById("searchSong");
    const playerWrap     = document.getElementById("playerWrap");
    const playerPlaceholder = document.getElementById("playerPlaceholder");

    // ── YouTube IFrame API ──
    let ytPlayer = null;
    let ytReady = false;
    let pendingVideoId = null;

    function extractVideoId(rawUrl) {
        try {
            const url = rawUrl.trim().replace("music.youtube.com", "youtube.com");
            const u = new URL(url);
            let vid = u.searchParams.get("v");
            if (!vid) {
                const m = u.pathname.match(/(?:embed\/|v\/|shorts\/)([^/?&]+)/);
                if (m) vid = m[1];
            }
            return vid || null;
        } catch(e) { return null; }
    }

    window.onYouTubeIframeAPIReady = function() {
        ytReady = true;
        const div = document.createElement('div');
        div.id = 'yt-player-el';
        playerWrap.appendChild(div);

        ytPlayer = new YT.Player('yt-player-el', {
            width: '100%', height: '100%',
            videoId: pendingVideoId || '',
            playerVars: { autoplay: 1, rel: 0, modestbranding: 1, playsinline: 1 },
            events: {
                onReady() {
                    if (pendingVideoId) { ytPlayer.loadVideoById(pendingVideoId); pendingVideoId = null; }
                },
                onStateChange(e) {
                    if (e.data === YT.PlayerState.PLAYING) {
                        playerPlaceholder.style.display = "none";
                    }
                },
                onError(e) {
                    const song = currentSong;
                    playerPlaceholder.style.display = "flex";
                    playerPlaceholder.innerHTML = `
                        <span style="font-size:2rem">🚫</span>
                        <span style="color:var(--text-mid);font-size:0.85rem">此影片不允許嵌入</span>
                        <a href="${song ? song.url : '#'}" target="_blank" style="
                            margin-top:10px;padding:12px 24px;
                            background:var(--accent);color:#fff;
                            border-radius:12px;text-decoration:none;
                            font-weight:700;font-size:1rem;
                            box-shadow:0 4px 16px var(--accent-glow)">
                            ▶ 開新分頁播放
                        </a>`;
                }
            }
        });
    };

    function loadVideo(videoId) {
        playerPlaceholder.style.display = "flex";
        playerPlaceholder.innerHTML = `<span class="play-icon">▶️</span><span>載入中...</span>`;
        if (!videoId) {
            playerPlaceholder.innerHTML = `<span class="play-icon">⚠️</span><span>無法解析連結</span>`;
            return;
        }
        if (ytReady && ytPlayer && ytPlayer.loadVideoById) {
            ytPlayer.loadVideoById(videoId);
        } else {
            pendingVideoId = videoId;
        }
    }

    async function initApp() {
        try {
            const res = await fetch(GAS_URL);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = (await res.json())
                .filter(s => s.url && s.title != null && String(s.url).trim() !== "")
                .map(s => ({ ...s, title: String(s.title), artist: String(s.artist), year: parseInt(s.year) }))
                .filter(s => !isNaN(s.year));
            if (data.length === 0) throw new Error("empty");
            fullDatabase = data;
            showSetupScreen();
        } catch(e) {
            loadingDiv.innerHTML = `<div class="error-msg">⚠️ 讀取失敗：${e.message}</div>`;
        }
    }

    function showSetupScreen() {
        loadingDiv.style.display = "none";
        setupArea.style.display = "block";
        gameArea.style.display = "none";
        endScreen.style.display = "none";
        const years = fullDatabase.map(s => s.year);
        document.getElementById("totalCount").textContent = fullDatabase.length;
        document.getElementById("dbMinYear").textContent = Math.min(...years);
        document.getElementById("dbMaxYear").textContent = Math.max(...years);
        startYearInput.value = Math.min(...years);
        endYearInput.value = Math.max(...years);
    }

    function startGame() {
        const start = parseInt(startYearInput.value);
        const end   = parseInt(endYearInput.value);
        if (isNaN(start) || isNaN(end) || start > end) { alert("請輸入有效的年份範圍！"); return; }
        gameQueue = fullDatabase.filter(s => s.year >= start && s.year <= end).sort((a,b) => a.year - b.year);
        if (gameQueue.length === 0) { alert(`在 ${start} 到 ${end} 年之間找不到歌曲。`); return; }
        originalQueue = [...gameQueue];
        history = [];
        setupArea.style.display = "none";
        gameArea.style.display = "block";
        filterSongList();
        nextSongRandom();
    }

    function replayGame() {
        gameQueue = [...originalQueue];
        history = [];
        endScreen.style.display = "none";
        gameArea.style.display = "block";
        filterSongList();
        nextSongRandom();
    }

    function renderCurrentSong() {
        remainingText.textContent = gameQueue.length;
        searchInput.value = "";
        filterSongList();

        infoBox.classList.remove("revealed");
        hiddenInfoDiv.style.transition = 'none';
        void hiddenInfoDiv.offsetWidth;
        setTimeout(() => { hiddenInfoDiv.style.transition = 'filter 0.5s ease, opacity 0.5s ease'; }, 50);

        document.getElementById("title").textContent  = currentSong.title;
        document.getElementById("artist").textContent = currentSong.artist;
        document.getElementById("year").textContent   = currentSong.year;

        document.querySelectorAll('.btn-prev').forEach(b => b.disabled = history.length === 0);

        loadVideo(extractVideoId(currentSong.url));
    }

    function filterSongList() {
        const kw = searchInput.value.toLowerCase().trim();
        const filtered = gameQueue.filter(s =>
            s.title.toLowerCase().includes(kw) ||
            s.artist.toLowerCase().includes(kw) ||
            s.year.toString().includes(kw)
        );
        songSelect.innerHTML = `<option value="">請選擇歌曲 (共 ${filtered.length} 筆)...</option>`;
        filtered.forEach(song => {
            const idx = gameQueue.indexOf(song);
            const opt = document.createElement("option");
            opt.value = idx;
            opt.text = `${song.year} | ${song.title} - ${song.artist}`;
            songSelect.appendChild(opt);
        });
    }

    function nextSongRandom() {
        if (gameQueue.length === 0) { showEndScreen(); return; }
        if (currentSong) history.push(currentSong);
        const idx = Math.floor(Math.random() * gameQueue.length);
        currentSong = gameQueue.splice(idx, 1)[0];
        renderCurrentSong();
    }

    function playSelectedSong() {
        const idx = parseInt(songSelect.value);
        if (isNaN(idx) || songSelect.value === "") return;
        if (currentSong) history.push(currentSong);
        currentSong = gameQueue.splice(idx, 1)[0];
        renderCurrentSong();
    }

    function prevSong() {
        if (history.length === 0) return;
        if (currentSong) gameQueue.unshift(currentSong);
        currentSong = history.pop();
        renderCurrentSong();
    }

    function reveal() {
        if (!currentSong) return;
        infoBox.classList.toggle("revealed");
    }

    function showEndScreen() {
        gameArea.style.display = "none";
        endScreen.style.display = "block";
    }

    function resetToSetup() {
        gameArea.style.display = "none";
        endScreen.style.display = "none";
        setupArea.style.display = "block";
        infoBox.classList.remove("revealed");
        if (ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo();
        playerPlaceholder.style.display = "none";
    }

    initApp();
</script>
</body>
</html>
